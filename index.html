<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN FLOW RADIO</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#b30000,#1a0000);
  color: white;
}

/* LOGO */
.logo {
  text-align: center;
  margin-top: 10px;
}

.logo img {
  width: 95%;
  max-width: 500px;
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(255,0,0,0.6);
}

/* BUSCADOR */
.search {
  width: 85%;
  margin: 10px auto;
  display: block;
  padding: 12px;
  border-radius: 25px;
  border: none;
}

/* BOTONES */
.botones {
  text-align: center;
  margin: 10px;
}

.botones button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 20px;
  background: white;
  color: red;
  font-weight: bold;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
  padding: 15px;
  padding-bottom: 100px;
}

.radio {
  background: white;
  color: black;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
}

.radio img {
  width: 100%;
  height: 90px;
  border-radius: 10px;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.player img {
  width: 50px;
  border-radius: 10px;
}

.btn {
  background: red;
  color: white;
  border: none;
  border-radius: 50%;
  padding: 10px;
  font-size: 18px;
}

.vol {
  width: 80px;
}
</style>
</head>

<body>

<!-- 🔥 LOGO -->
<div class="logo">
  <img src="logo.png" alt="Urban Flow Radio">
</div>

<input class="search" id="buscador" placeholder="Buscar...">

<!-- BOTONES NUEVOS -->
<div class="botones">
  <button onclick="modoRadios()">Radios</button>
  <button onclick="subirMusica()">Tu Música</button>
  <button onclick="cargarM3U()">Lista M3U</button>
</div>

<input type="file" id="fileMusica" accept="audio/*" multiple style="display:none">
<input type="file" id="fileM3U" accept=".m3u" style="display:none">

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player">
  <img id="cover" src="https://via.placeholder.com/50">
  <div id="titulo">Nada sonando</div>

  <button class="btn" id="playBtn">▶</button>
  <input type="range" id="vol" class="vol" min="0" max="1" step="0.01" value="1">

  <audio id="audio"></audio>
</div>

<script>

/* 🔥 RADIOS ESTABLES */
let radios = [
{nombre:"Urban Radio", url:"https://stream.0nlineradio.com/urban"},
{nombre:"Dance Wave", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
{nombre:"Romantic Hits EU", url:"https://stream.zeno.fm/0r0xa792kwzuv"}
];

let listaActual = radios;

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const titulo = document.getElementById("titulo");
const cover = document.getElementById("cover");
const playBtn = document.getElementById("playBtn");
const vol = document.getElementById("vol");

/* LOGO */
function logo(nombre){
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(nombre)}&background=ff0000&color=fff`;
}

/* RENDER */
function render(lista){
  grid.innerHTML = "";

  lista.forEach(r => {
    const div = document.createElement("div");

    div.className = "radio";
    div.innerHTML = `
      <img src="${logo(r.nombre)}">
      <p>${r.nombre}</p>
    `;

    div.onclick = () => {
      audio.src = r.url;
      audio.play();
      titulo.textContent = r.nombre;
      cover.src = logo(r.nombre);
    };

    grid.appendChild(div);
  });
}

/* BUSCAR */
document.getElementById("buscador").addEventListener("input", e => {
  const t = e.target.value.toLowerCase();
  render(listaActual.filter(r => r.nombre.toLowerCase().includes(t)));
});

/* PLAY */
playBtn.onclick = () => {
  if(audio.paused){
    audio.play();
    playBtn.textContent = "⏸";
  } else {
    audio.pause();
    playBtn.textContent = "▶";
  }
};

audio.onplay = () => playBtn.textContent = "⏸";
audio.onpause = () => playBtn.textContent = "▶";

/* VOLUMEN */
vol.oninput = () => audio.volume = vol.value;

/* MODO RADIOS */
function modoRadios(){
  listaActual = radios;
  render(listaActual);
}

/* 🎵 SUBIR MÚSICA */
function subirMusica(){
  document.getElementById("fileMusica").click();
}

document.getElementById("fileMusica").addEventListener("change", e => {
  const files = Array.from(e.target.files);

  listaActual = files.map(f => ({
    nombre: f.name,
    url: URL.createObjectURL(f)
  }));

  render(listaActual);
});

/* 📺 CARGAR M3U */
function cargarM3U(){
  document.getElementById("fileM3U").click();
}

document.getElementById("fileM3U").addEventListener("change", e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event){
    const contenido = event.target.result.split("\n");
    listaActual = [];

    for(let i=0;i<contenido.length;i++){
      if(contenido[i].includes("#EXTINF")){
        const nombre = contenido[i].split(",")[1];
        const url = contenido[i+1];
        listaActual.push({nombre, url});
      }
    }

    render(listaActual);
  };

  reader.readAsText(file);
});

/* INICIO */
render(radios);

</script>

</body>
</html>
