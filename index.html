<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN FLOW RADIO</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a0000;
  color:white;
}

.header{padding:15px}
.search{
  width:100%;
  padding:12px;
  border-radius:25px;
  border:none;
  background:#222;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
  padding-bottom:100px;
}

.card{
  background:#1a1a1a;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.card img{
  width:100%;
  border-radius:10px;
}

.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.btn{
  background:red;
  border:none;
  border-radius:50%;
  width:40px;height:40px;
  color:white;
}
</style>
</head>

<body>

<div class="header">
  <input id="search" class="search" placeholder="Buscar radio...">
</div>

<div class="grid" id="grid"></div>

<div class="player">
  <img id="cover" src="https://via.placeholder.com/50">
  <div id="title">Nada sonando</div>
  <button id="playBtn" class="btn">▶</button>
  <audio id="audio"></audio>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const radios = [

/* 🇵🇪 PERÚ */
{nombre:"RPP Noticias", tipo:"peru", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/RPP_SC.mp3"},
{nombre:"Ritmo Romántica", tipo:"peru", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/CRP_RIT_SC.mp3"},
{nombre:"Radio Moda", tipo:"peru", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/CRP_MOD_SC.mp3"},
{nombre:"Radiomar", tipo:"peru", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/CRP_MAR_SC.mp3"},
{nombre:"La Karibeña", tipo:"peru", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/CRP_KAR_SC.mp3"},
{nombre:"Oasis", tipo:"peru", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/CRP_OAS_SC.mp3"},
{nombre:"Exitosa", tipo:"peru", url:"https://cu.onliv3.com/live/exitosa.m3u8"},
{nombre:"Radio Nacional", tipo:"peru", url:"https://stream.radionacional.gob.pe/nacional.mp3"},

/* 🌍 TUS RADIOS */
{nombre:"Urban Radio", tipo:"online", url:"https://stream.0nlineradio.com/urban"},
{nombre:"Dance Wave", tipo:"online", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", tipo:"online", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
{nombre:"Romantic Hits EU", tipo:"online", url:"https://stream.zeno.fm/0r0xa792kwzuv"}

];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const cover = document.getElementById("cover");
const playBtn = document.getElementById("playBtn");

audio.muted = false;
audio.volume = 1;

let hls;

/* 🔥 PROXY INTELIGENTE */
function getUrl(url){
  if(url.includes("streamtheworld")){
    return "https://corsproxy.io/?"+encodeURIComponent(url);
  }
  return url;
}

function logo(n){
  return "https://ui-avatars.com/api/?name="+encodeURIComponent(n)+"&background=ff0000&color=fff";
}

function playRadio(r){

  if(hls){ hls.destroy(); }

  const finalUrl = getUrl(r.url);

  if(r.url.includes(".m3u8")){
    if(Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(finalUrl);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=> audio.play());
    } else {
      audio.src = finalUrl;
      audio.play();
    }
  } else {
    audio.src = finalUrl;
    audio.play();
  }

  title.textContent = r.nombre;
  cover.src = logo(r.nombre);
}

/* RENDER */
function render(list){
  grid.innerHTML="";
  list.forEach(r=>{
    const d=document.createElement("div");
    d.className="card";
    d.innerHTML=`
      <img src="${logo(r.nombre)}">
      <p>${r.nombre}</p>
    `;
    d.onclick=()=>playRadio(r);
    grid.appendChild(d);
  });
}

render(radios);

/* BUSCAR */
search.oninput=e=>{
  const t=e.target.value.toLowerCase();
  render(radios.filter(r=>r.nombre.toLowerCase().includes(t)));
};

/* PLAY */
playBtn.onclick=()=>{
  if(audio.paused){audio.play();}else{audio.pause();}
};

/* FIX ANDROID */
document.body.addEventListener("click", () => {
  audio.play().catch(()=>{});
});
</script>

</body>
</html>
