<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN FLOW RADIO</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#000000,#1a1a1a);
  color: white;
}

/* 🔥 TITULO URBANO */
.header {
  text-align: center;
  font-size: 38px;
  font-weight: 900;
  margin: 20px;
  letter-spacing: 3px;
  background: linear-gradient(90deg,#ff0000,#ff9900,#00ffcc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 20px rgba(255,0,0,0.6);
}

/* BUSCADOR */
.search {
  width: 85%;
  margin: auto;
  display: block;
  padding: 12px;
  border-radius: 25px;
  border: none;
}

/* CATEGORIAS */
.categorias {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 15px;
}

.cat {
  background: #ff9900;
  padding: 8px 15px;
  border-radius: 20px;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 12px;
  padding: 15px;
}

.radio {
  background: white;
  color: black;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
}

.radio img {
  width: 100%;
  height: 80px;
  border-radius: 10px;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.player img {
  width: 50px;
  border-radius: 10px;
}

.btn {
  background: #ff9900;
  border: none;
  border-radius: 50%;
  padding: 10px;
  font-size: 18px;
}

.vol {
  width: 80px;
}
</style>
</head>

<body>

<div class="header">🔥 URBAN FLOW RADIO 🔥</div>

<input class="search" id="buscador" placeholder="Buscar...">

<div class="categorias">
  <div class="cat" onclick="filtrar('all')">Todo</div>
  <div class="cat" onclick="filtrar('urban')">Urban</div>
  <div class="cat" onclick="filtrar('baladasUSA')">Baladas USA</div>
  <div class="cat" onclick="filtrar('baladasLATAM')">Baladas LATAM</div>
  <div class="cat" onclick="filtrar('baladasEU')">Baladas Europa</div>
</div>

<div class="grid" id="grid"></div>

<div class="player">
  <img id="cover" src="https://via.placeholder.com/50">
  <div id="titulo">Nada sonando</div>

  <button class="btn" id="playBtn">▶</button>
  <input type="range" id="vol" class="vol" min="0" max="1" step="0.01" value="1">

  <audio id="audio"></audio>
</div>

<script>
const radios = [

/* URBAN (los que funcionan) */
{nombre:"Dance Wave", tipo:"urban", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", tipo:"urban", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
{nombre:"Urban Radio", tipo:"urban", url:"https://stream.0nlineradio.com/urban"},

/* BALADAS USA */
{nombre:"Soft Rock Radio", tipo:"baladasUSA", url:"https://stream.zeno.fm/7g1p9h8tkwzuv"},
{nombre:"Love Songs FM", tipo:"baladasUSA", url:"https://stream.zeno.fm/9s7z1k5f8wzuv"},

/* BALADAS LATAM */
{nombre:"Baladas Románticas", tipo:"baladasLATAM", url:"https://stream.zeno.fm/f3y6q8zq5wzuv"},
{nombre:"Amor FM Latino", tipo:"baladasLATAM", url:"https://stream.zeno.fm/8u0zv4kz2wzuv"},

/* BALADAS EUROPA */
{nombre:"Euro Love Radio", tipo:"baladasEU", url:"https://stream.zeno.fm/d3y6f9r6kwzuv"},
{nombre:"Romantic Hits EU", tipo:"baladasEU", url:"https://stream.zeno.fm/0r0xa792kwzuv"}

];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const titulo = document.getElementById("titulo");
const cover = document.getElementById("cover");
const playBtn = document.getElementById("playBtn");
const vol = document.getElementById("vol");

let listaActual = radios;

/* LOGO */
function logo(nombre){
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(nombre)}&background=ff9900&color=fff`;
}

/* RENDER */
function render(lista){
  grid.innerHTML = "";

  lista.forEach(r => {
    const div = document.createElement("div");

    div.className = "radio";
    div.innerHTML = `
      <img src="${logo(r.nombre)}">
      <p>${r.nombre}</p>
    `;

    div.onclick = () => {
      audio.src = r.url;
      audio.play();
      titulo.textContent = r.nombre;
      cover.src = logo(r.nombre);
    };

    grid.appendChild(div);
  });
}

/* FILTRO */
function filtrar(tipo){
  if(tipo === "all") listaActual = radios;
  else listaActual = radios.filter(r => r.tipo === tipo);

  render(listaActual);
}

/* BUSCAR */
document.getElementById("buscador").addEventListener("input", e => {
  const t = e.target.value.toLowerCase();
  render(listaActual.filter(r => r.nombre.toLowerCase().includes(t)));
});

/* PLAY */
playBtn.onclick = () => {
  if(audio.paused){
    audio.play();
    playBtn.textContent = "⏸";
  } else {
    audio.pause();
    playBtn.textContent = "▶";
  }
};

audio.onplay = () => playBtn.textContent = "⏸";
audio.onpause = () => playBtn.textContent = "▶";

/* VOLUMEN */
vol.oninput = () => audio.volume = vol.value;

/* INIT */
render(radios);
</script>

</body>
</html>
