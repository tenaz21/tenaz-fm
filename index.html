<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN FLOW RADIO</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#b30000,#1a0000);
  color: white;
}

/* LOGO */
.logo {
  display: flex;
  justify-content: center;
  padding: 15px;
}
.logo img {
  width: 100%;
  max-width: 420px;
  border-radius: 15px;
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  from { box-shadow: 0 0 10px red; }
  to { box-shadow: 0 0 30px orange; }
}

/* BUSCADOR */
.search {
  width: 85%;
  margin: auto;
  padding: 12px;
  border-radius: 25px;
  border: none;
  display: block;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
  padding: 15px;
  padding-bottom: 120px;
}

.radio {
  background: white;
  color: black;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  position: relative;
}

.radio img {
  width: 100%;
  height: 90px;
  border-radius: 10px;
}

/* FAVORITO */
.fav {
  position: absolute;
  top: 5px;
  right: 8px;
  font-size: 18px;
  cursor: pointer;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.player img {
  width: 50px;
  border-radius: 10px;
}

.btn {
  background: red;
  border: none;
  border-radius: 50%;
  padding: 10px;
  color: white;
}

.vol {
  width: 80px;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
  <img src="logo.png">
</div>

<input class="search" id="buscador" placeholder="Buscar...">

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player">
  <img id="cover" src="https://via.placeholder.com/50">
  <div id="titulo">Nada sonando</div>

  <button class="btn" id="playBtn">▶</button>
  <input type="range" id="vol" class="vol" min="0" max="1" step="0.01" value="1">

  <audio id="audio"></audio>
</div>

<script>
let radios = [

/* 🔥 RADIOS QUE FUNCIONAN */
{nombre:"Urban Radio", url:"https://stream.0nlineradio.com/urban"},
{nombre:"Dance Wave", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
{nombre:"Romantic Hits EU", url:"https://stream.zeno.fm/0r0xa792kwzuv"}

];

let favoritos = JSON.parse(localStorage.getItem("fav")) || [];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const titulo = document.getElementById("titulo");
const cover = document.getElementById("cover");
const playBtn = document.getElementById("playBtn");
const vol = document.getElementById("vol");

/* LOGO RADIO */
function logo(nombre){
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(nombre)}&background=ff0000&color=fff`;
}

/* RENDER */
function render(lista){
  grid.innerHTML = "";

  lista.forEach(r => {

    const esFav = favoritos.includes(r.nombre);

    const div = document.createElement("div");
    div.className = "radio";

    div.innerHTML = `
      <span class="fav">${esFav ? "❤️" : "🤍"}</span>
      <img src="${logo(r.nombre)}">
      <p>${r.nombre}</p>
    `;

    /* PLAY */
    div.onclick = () => {
      audio.src = r.url;
      audio.play();
      titulo.textContent = r.nombre;
      cover.src = logo(r.nombre);
    };

    /* FAVORITO */
    div.querySelector(".fav").onclick = (e) => {
      e.stopPropagation();

      if(esFav){
        favoritos = favoritos.filter(f => f !== r.nombre);
      } else {
        favoritos.push(r.nombre);
      }

      localStorage.setItem("fav", JSON.stringify(favoritos));
      render(radios);
    };

    grid.appendChild(div);
  });
}

/* BUSCAR */
document.getElementById("buscador").addEventListener("input", e => {
  const t = e.target.value.toLowerCase();
  render(radios.filter(r => r.nombre.toLowerCase().includes(t)));
});

/* PLAY */
playBtn.onclick = () => {
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
};

audio.onplay = () => playBtn.textContent = "⏸";
audio.onpause = () => playBtn.textContent = "▶";

/* VOLUMEN */
vol.oninput = () => audio.volume = vol.value;

/* INICIO */
render(radios);
</script>

</body>
</html>
