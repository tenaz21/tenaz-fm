<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN FLOW RADIO</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#b30000,#1a0000);
  color: white;
}

/* 🔥 LOGO NIVEL DIOS */
.logo {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px 10px;
}

.logo img {
  width: 100%;
  max-width: 420px;
  height: auto;
  object-fit: contain;
  border-radius: 15px;
  animation: glow 2s infinite alternate;
}

/* ANIMACIÓN */
@keyframes glow {
  from { box-shadow: 0 0 10px red; }
  to { box-shadow: 0 0 35px orange; }
}

/* BUSCADOR */
.search {
  width: 85%;
  margin: auto;
  display: block;
  padding: 12px;
  border-radius: 25px;
  border: none;
  margin-bottom: 10px;
}

/* BOTONES */
.botones {
  text-align: center;
}

.botones button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 20px;
  background: white;
  color: red;
  font-weight: bold;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
  padding: 15px;
  padding-bottom: 120px;
}

.radio {
  background: white;
  color: black;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.radio:hover {
  transform: scale(1.05);
}

.radio img {
  width: 100%;
  height: 90px;
  border-radius: 10px;
}

/* PLAYER PRO */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: linear-gradient(90deg,#000,#111);
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.player img {
  width: 50px;
  border-radius: 10px;
}

.btn {
  background: red;
  border: none;
  border-radius: 50%;
  padding: 10px;
  font-size: 18px;
  color: white;
  box-shadow: 0 0 10px red;
}

/* VOLUMEN */
.vol {
  width: 80px;
}

/* BARRA ANIMADA */
.equalizer {
  display: flex;
  gap: 3px;
}

.bar {
  width: 3px;
  height: 10px;
  background: lime;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%,100% {height:5px;}
  50% {height:15px;}
}
</style>
</head>

<body>

<!-- 🔥 LOGO -->
<div class="logo">
  <img src="logo.png">
</div>

<input class="search" id="buscador" placeholder="Buscar...">

<div class="botones">
  <button onclick="modoRadios()">Radios</button>
  <button onclick="subirMusica()">Tu Música</button>
  <button onclick="cargarM3U()">Lista M3U</button>
</div>

<input type="file" id="fileMusica" accept="audio/*" multiple hidden>
<input type="file" id="fileM3U" accept=".m3u" hidden>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player">
  <img id="cover" src="https://via.placeholder.com/50">
  <div>
    <div id="titulo">Nada sonando</div>
    <div class="equalizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
  </div>

  <button class="btn" id="playBtn">▶</button>
  <input type="range" id="vol" class="vol" min="0" max="1" step="0.01" value="1">

  <audio id="audio"></audio>
</div>

<script>
let radios = [
{nombre:"Urban Radio", url:"https://stream.0nlineradio.com/urban"},
{nombre:"Dance Wave", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
{nombre:"Romantic Hits EU", url:"https://stream.zeno.fm/0r0xa792kwzuv"}
];

let listaActual = radios;

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const titulo = document.getElementById("titulo");
const cover = document.getElementById("cover");
const playBtn = document.getElementById("playBtn");
const vol = document.getElementById("vol");

function logo(nombre){
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(nombre)}&background=ff0000&color=fff`;
}

function render(lista){
  grid.innerHTML = "";

  lista.forEach(r => {
    const div = document.createElement("div");
    div.className = "radio";

    div.innerHTML = `
      <img src="${logo(r.nombre)}">
      <p>${r.nombre}</p>
    `;

    div.onclick = () => {
      audio.src = r.url;
      audio.play();
      titulo.textContent = r.nombre;
      cover.src = logo(r.nombre);
    };

    grid.appendChild(div);
  });
}

document.getElementById("buscador").addEventListener("input", e => {
  const t = e.target.value.toLowerCase();
  render(listaActual.filter(r => r.nombre.toLowerCase().includes(t)));
});

playBtn.onclick = () => {
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
};

audio.onplay = () => playBtn.textContent = "⏸";
audio.onpause = () => playBtn.textContent = "▶";

vol.oninput = () => audio.volume = vol.value;

/* MÚSICA */
function subirMusica(){
  fileMusica.click();
}

fileMusica.onchange = e => {
  const files = [...e.target.files];
  listaActual = files.map(f => ({
    nombre:f.name,
    url:URL.createObjectURL(f)
  }));
  render(listaActual);
};

/* M3U */
function cargarM3U(){
  fileM3U.click();
}

fileM3U.onchange = e => {
  const reader = new FileReader();
  reader.onload = event => {
    const lines = event.target.result.split("\n");
    listaActual = [];

    for(let i=0;i<lines.length;i++){
      if(lines[i].includes("#EXTINF")){
        listaActual.push({
          nombre: lines[i].split(",")[1],
          url: lines[i+1]
        });
      }
    }

    render(listaActual);
  };
  reader.readAsText(e.target.files[0]);
};

function modoRadios(){
  listaActual = radios;
  render(listaActual);
}

render(radios);
</script>

</body>
</html>

</script>

</body>
</html>
