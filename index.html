<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENAZ FM</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(#7a0000, #1a0000);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

/* BUSCADOR */
.search {
  width: 80%;
  margin: auto;
  display: block;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

/* CATEGORIAS */
.categorias {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 15px;
}

.cat {
  padding: 8px 15px;
  background: #ff9800;
  border-radius: 20px;
  white-space: nowrap;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 15px;
}

.radio {
  background: #fff;
  color: black;
  border-radius: 15px;
  text-align: center;
  padding: 10px;
  cursor: pointer;
}

.radio img {
  width: 100%;
  border-radius: 10px;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.player img {
  width: 50px;
  border-radius: 10px;
}

.controls button {
  background: orange;
  border: none;
  border-radius: 50%;
  padding: 10px;
  margin: 5px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="header">🇵🇪 TENAZ FM</div>

<input class="search" placeholder="Buscar radio...">

<div class="categorias">
  <div class="cat">Todas</div>
  <div class="cat">Cumbia</div>
  <div class="cat">Rock</div>
  <div class="cat">Hip Hop</div>
</div>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player">
  <img id="cover" src="https://via.placeholder.com/50">
  <div id="titulo">Nada sonando</div>

  <div class="controls">
    <button onclick="playPause()">▶</button>
  </div>

  <audio id="audio"></audio>
</div>

<script>
const radios = [
  {nombre:"Dance Wave", url:"https://dancewave.online/dance.mp3"},
  {nombre:"Radio Internacional", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
  {nombre:"Hip Hop Hits", url:"https://stream.zeno.fm/4wqre23fytzuv"},
  {nombre:"Urban Beats", url:"https://stream.zeno.fm/f8xw4k6x5wzuv"}
];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const titulo = document.getElementById("titulo");

let playing = false;

/* CREAR RADIOS */
radios.forEach(r => {
  const div = document.createElement("div");
  div.className = "radio";

  div.innerHTML = `
    <img src="https://via.placeholder.com/100">
    <p>${r.nombre}</p>
  `;

  div.onclick = () => {
    audio.src = r.url;
    audio.play();
    titulo.textContent = r.nombre;
    playing = true;
  };

  grid.appendChild(div);
});

/* PLAY */
function playPause(){
  if(!audio.src) return;

  if(playing){
    audio.pause();
  } else {
    audio.play();
  }

  playing = !playing;
}
</script>

</body>
</html>
