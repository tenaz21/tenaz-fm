<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENAZ FM</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #121212;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* TITULO */
.titulo {
  margin-top: 20px;
  font-size: 2.5rem;
  font-weight: 900;
  background: linear-gradient(90deg, #00ffcc, #00aaff, #ff00cc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* BUSCADOR */
#buscador {
  margin-top: 15px;
  padding: 10px;
  width: 80%;
  max-width: 400px;
  border-radius: 8px;
  border: none;
}

/* GRID */
#contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
  width: 90%;
  max-width: 900px;
  margin-top: 20px;
}

.radio {
  background: #1f1f1f;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  position: relative;
}

.radio:hover {
  box-shadow: 0 0 10px #00ffcc;
}

.radio img {
  width: 100%;
  height: 90px;
  border-radius: 8px;
}

/* FAVORITO */
.fav {
  position: absolute;
  top: 5px;
  right: 8px;
  font-size: 18px;
  cursor: pointer;
}

/* PLAYER */
#playerBox {
  margin-top: 25px;
  background: #1f1f1f;
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,255,204,0.3);
}

#cover {
  width: 100%;
  height: 180px;
  border-radius: 12px;
}

.play-btn {
  margin-top: 15px;
  background: #00ffcc;
  border: none;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  font-size: 20px;
  cursor: pointer;
}

/* VOLUMEN */
.volume-box {
  margin-top: 10px;
}

#volumen {
  width: 150px;
}
</style>
</head>

<body>

<h1 class="titulo">TENAZ FM 🔥</h1>

<input type="text" id="buscador" placeholder="Buscar radio...">

<div id="contenedor"></div>

<div id="playerBox">
  <img id="cover" src="https://via.placeholder.com/300x200?text=TENAZ+FM">
  <h3 id="tituloRadio">Selecciona una radio</h3>

  <button class="play-btn" onclick="togglePlay()">▶</button>

  <div class="volume-box">
    <span id="iconoVol">🔊</span><br>
    <input type="range" id="volumen" min="0" max="1" step="0.01" value="1">
  </div>

  <audio id="player"></audio>
</div>

<script>
const radios = [

{nombre:"Capital", img:"https://via.placeholder.com/150?text=Capital", url:"https://stream.zeno.fm/8u0zv4kz2wzuv"},
{nombre:"Oxígeno", img:"https://via.placeholder.com/150?text=Oxigeno", url:"https://stream.zeno.fm/0r0xa792kwzuv"},
{nombre:"Corazón", img:"https://via.placeholder.com/150?text=Corazon", url:"https://stream.zeno.fm/f3y6q8zq5wzuv"},

{nombre:"Radio Internacional", img:"https://via.placeholder.com/150?text=Music", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
{nombre:"Dance Wave", img:"https://via.placeholder.com/150?text=Dance", url:"https://dancewave.online/dance.mp3"},

/* HIP HOP 🔥 */
{nombre:"Hip Hop Hits", img:"https://via.placeholder.com/150?text=HipHop", url:"https://stream.zeno.fm/4wqre23fytzuv"},
{nombre:"Rap FM", img:"https://via.placeholder.com/150?text=Rap", url:"https://stream.zeno.fm/7x8f7v6r8wzuv"},
{nombre:"Urban Beats", img:"https://via.placeholder.com/150?text=Urban", url:"https://stream.zeno.fm/f8xw4k6x5wzuv"},
{nombre:"Old School Hip Hop", img:"https://via.placeholder.com/150?text=90s", url:"https://stream.zeno.fm/3kz8p8y2kwzuv"}

];

let favoritos = JSON.parse(localStorage.getItem("fav")) || [];

const contenedor = document.getElementById("contenedor");
const player = document.getElementById("player");
const titulo = document.getElementById("tituloRadio");
const cover = document.getElementById("cover");
const btn = document.querySelector(".play-btn");
const volumen = document.getElementById("volumen");
const iconoVol = document.getElementById("iconoVol");

let playing = false;

/* MOSTRAR */
function cargar(lista){
  contenedor.innerHTML = "";

  lista.forEach(radio => {

    const esFav = favoritos.includes(radio.nombre);

    const div = document.createElement("div");
    div.className = "radio";

    div.innerHTML = `
      <span class="fav">${esFav ? "❤️" : "🤍"}</span>
      <img src="${radio.img}">
      <p>${radio.nombre}</p>
    `;

    /* CLICK RADIO */
    div.onclick = () => {
      player.src = radio.url;
      titulo.textContent = radio.nombre;
      cover.src = radio.img;
      player.play();
      btn.innerHTML = "⏸";
      playing = true;
    };

    /* FAVORITO */
    div.querySelector(".fav").onclick = (e) => {
      e.stopPropagation();

      if(esFav){
        favoritos = favoritos.filter(f => f !== radio.nombre);
      } else {
        favoritos.push(radio.nombre);
      }

      localStorage.setItem("fav", JSON.stringify(favoritos));
      cargar(radios);
    };

    contenedor.appendChild(div);
  });
}

/* BUSCADOR */
document.getElementById("buscador").addEventListener("input", e => {
  const t = e.target.value.toLowerCase();
  cargar(radios.filter(r => r.nombre.toLowerCase().includes(t)));
});

/* PLAY */
function togglePlay(){
  if(!player.src) return;

  if(playing){
    player.pause();
    btn.innerHTML = "▶";
  } else {
    player.play();
    btn.innerHTML = "⏸";
  }

  playing = !playing;
}

/* VOLUMEN */
volumen.addEventListener("input", () => {
  player.volume = volumen.value;

  if(volumen.value == 0) iconoVol.textContent = "🔇";
  else if(volumen.value < 0.5) iconoVol.textContent = "🔉";
  else iconoVol.textContent = "🔊";
});

/* INICIO */
cargar(radios);
</script>

</body>
</html>
