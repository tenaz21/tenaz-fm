<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radios Peruanas PRO MAX</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #121212;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    margin-top: 20px;
    font-size: 2rem;
    text-align: center;
  }

  #radiosContainer {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 20px;
    width: 90%;
    max-width: 1000px;
    margin-top: 20px;
  }

  .radio {
    background: #1f1f1f;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    text-align: center;
    padding: 10px;
  }

  .radio:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00ffcc;
  }

  .radio img {
    width: 100%;
    height: 100px;
    object-fit: cover;
    border-radius: 8px;
  }

  .radio p {
    margin-top: 8px;
    font-weight: bold;
    font-size: 0.9rem;
  }

  #currentRadio {
    margin-top: 30px;
    background: #1f1f1f;
    padding: 15px 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 500px;
    text-align: center;
    box-shadow: 0 0 10px #00ffcc;
  }

  #player {
    margin-top: 15px;
    width: 100%;
    border-radius: 8px;
  }

  @media (max-width: 600px) {
    .radio img { height: 80px; }
    h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<h1>🎵 Radios Peruanas PRO MAX</h1>

<div id="radiosContainer"></div>

<div id="currentRadio">
  <h2 id="radioName">Cargando...</h2>
  <audio id="player" controls autoplay></audio>
</div>

<script>
const radios = [
  {nombre:"RPP Noticias", img:"https://i.imgur.com/6z4KQ9B.png", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/RPP_SC"},
  {nombre:"Radio Moda", img:"https://i.imgur.com/VK0kS0F.png", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/MODA_SC"},
  {nombre:"Studio 92", img:"https://i.imgur.com/YKXxw6T.png", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/STUDIO92_SC"},
  {nombre:"Radio Oasis", img:"https://i.imgur.com/2Zs7XbP.png", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/OASIS_SC"},
  {nombre:"La Mega", img:"https://i.imgur.com/0KFBHTB.png", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/MEGA_SC"},
  {nombre:"Panamericana Radio", img:"https://i.imgur.com/QkK0G7G.png", url:"https://cdnhd.iblups.com/hls/ptv2radio.m3u8"},
  {nombre:"Top Latino Radio", img:"https://i.imgur.com/emFmJsg.png", url:"http://online.radiodifusion.net:1935/livetv/latinoSD.stream/playlist.m3u8"},
  {nombre:"Radio Exitosa", img:"https://i.imgur.com/XpQKZ8S.png", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/EXITOSA_SC"},
  {nombre:"Radio Internacional", img:"https://via.placeholder.com/150?text=Music", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
  {nombre:"Dance Wave", img:"https://via.placeholder.com/150?text=Dance", url:"https://dancewave.online/dance.mp3"}
];

const container = document.getElementById('radiosContainer');
const player = document.getElementById('player');
const radioName = document.getElementById('radioName');

// Cargar tarjetas de radios
radios.forEach(radio => {
  const div = document.createElement('div');
  div.className = 'radio';
  div.innerHTML = `<img src="${radio.img}" alt="${radio.nombre}"><p>${radio.nombre}</p>`;
  div.addEventListener('click', () => {
    player.src = radio.url;
    player.play();
    radioName.textContent = radio.nombre;
  });
  container.appendChild(div);
});

// Reproducir la primera radio al cargar
if (radios.length > 0) {
  player.src = radios[0].url;
  radioName.textContent = radios[0].nombre;
  player.play().catch(() => {
    console.log("Autoplay bloqueado por el navegador, haz clic para reproducir.");
  });
}
</script>

</body>
</html>
