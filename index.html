<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENAZ FM</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#8b0000,#1a0000);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

/* BUSCADOR */
.search {
  width: 85%;
  margin: auto;
  display: block;
  padding: 12px;
  border-radius: 25px;
  border: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  padding: 15px;
}

.radio {
  background: white;
  color: black;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  position: relative;
  cursor: pointer;
}

.radio img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  border-radius: 10px;
}

/* FAVORITO */
.fav {
  position: absolute;
  top: 5px;
  right: 8px;
  font-size: 18px;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.player img {
  width: 50px;
  border-radius: 10px;
}

/* BOTON */
.btn {
  background: orange;
  border: none;
  border-radius: 50%;
  padding: 10px;
  font-size: 18px;
}

/* VOLUMEN */
.vol {
  width: 80px;
}
</style>
</head>

<body>

<div class="header">🔥 TENAZ FM</div>

<input class="search" id="buscador" placeholder="Buscar radio...">

<div class="grid" id="grid"></div>

<div class="player">
  <img id="cover" src="https://via.placeholder.com/50">
  <div id="titulo">Nada sonando</div>

  <button class="btn" id="playBtn">▶</button>

  <input type="range" id="vol" class="vol" min="0" max="1" step="0.01" value="1">

  <audio id="audio"></audio>
</div>

<script>
const radios = [

/* FUNCIONAN */
{nombre:"Dance Wave", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},

/* HIP HOP 🔥 */
{nombre:"Hot 108 Jamz", url:"https://icecast.powerhitz.com/icecast.php?i=1&file=hot108jamz"},
{nombre:"2000 FM Hip Hop", url:"https://2000fm.stream.laut.fm/2000fm"},
{nombre:"Urban Radio", url:"https://stream.0nlineradio.com/urban"},
{nombre:"Streetz Radio", url:"https://stream.zeno.fm/9s7z1k5f8wzuv"}

];

let favoritos = JSON.parse(localStorage.getItem("fav")) || [];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const titulo = document.getElementById("titulo");
const cover = document.getElementById("cover");
const playBtn = document.getElementById("playBtn");
const vol = document.getElementById("vol");

let current = null;

/* LOGO AUTOMATICO */
function getLogo(nombre){
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(nombre)}&background=ff9800&color=fff`;
}

/* RENDER */
function render(lista){
  grid.innerHTML = "";

  lista.forEach(r => {

    const fav = favoritos.includes(r.nombre);

    const div = document.createElement("div");
    div.className = "radio";

    div.innerHTML = `
      <span class="fav">${fav ? "❤️" : "🤍"}</span>
      <img src="${getLogo(r.nombre)}">
      <p>${r.nombre}</p>
    `;

    div.onclick = () => {
      audio.src = r.url;
      audio.play();
      titulo.textContent = r.nombre;
      cover.src = getLogo(r.nombre);
      current = r;
    };

    /* FAVORITO */
    div.querySelector(".fav").onclick = (e) => {
      e.stopPropagation();

      if(fav){
        favoritos = favoritos.filter(f => f !== r.nombre);
      } else {
        favoritos.push(r.nombre);
      }

      localStorage.setItem("fav", JSON.stringify(favoritos));
      render(lista);
    };

    grid.appendChild(div);
  });
}

/* PLAY REAL */
playBtn.onclick = () => {
  if(!audio.src) return;

  if(audio.paused){
    audio.play();
    playBtn.textContent = "⏸";
  } else {
    audio.pause();
    playBtn.textContent = "▶";
  }
};

/* SINCRONIZAR BOTON */
audio.onplay = () => playBtn.textContent = "⏸";
audio.onpause = () => playBtn.textContent = "▶";

/* VOLUMEN */
vol.oninput = () => audio.volume = vol.value;

/* BUSCAR */
document.getElementById("buscador").addEventListener("input", e => {
  const t = e.target.value.toLowerCase();
  render(radios.filter(r => r.nombre.toLowerCase().includes(t)));
});

/* INIT */
render(radios);
</script>

</body>
</html>
