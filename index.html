<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN FLOW RADIO TENAZOA</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#ff0000,#0a0000);
  color: white;
}

/* LOGO */
.logo {
  text-align: center;
  padding: 15px;
}
.logo img {
  width: 90%;
  max-width: 380px;
  border-radius: 20px;
  box-shadow: 0 0 30px red;
}

/* BUSCADOR */
.search {
  width: 85%;
  margin: auto;
  padding: 12px;
  border-radius: 30px;
  border: none;
  display: block;
  background: rgba(255,255,255,0.1);
  color: white;
  backdrop-filter: blur(10px);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
  padding: 15px;
  padding-bottom: 120px;
}

.radio {
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.radio:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px red;
}

.radio img {
  width: 100%;
  height: 100px;
  border-radius: 15px;
}

/* FAVORITOS */
.fav {
  position: absolute;
  right: 10px;
  top: 5px;
  font-size: 18px;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(10px);
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.player img {
  width: 55px;
  border-radius: 12px;
}

.btn {
  background: red;
  border: none;
  border-radius: 50%;
  padding: 12px;
  font-size: 16px;
  color: white;
  box-shadow: 0 0 10px red;
}

.vol {
  width: 70px;
}
</style>
</head>

<body>

<div class="logo">
  <img src="logo.png">
</div>

<input class="search" id="buscador" placeholder="🔍 Buscar radio...">

<div class="grid" id="grid"></div>

<div class="player">
  <img id="cover" src="https://via.placeholder.com/50">
  <div id="titulo">Nada sonando</div>

  <button class="btn" id="playBtn">▶</button>
  <input type="range" id="vol" class="vol" min="0" max="1" step="0.01" value="1">

  <audio id="audio"></audio>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
let radios = [
{nombre:"RPP Noticias", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/RPP_SC.mp3"},
{nombre:"Ritmo Romántica", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/CRP_RIT_SC.mp3"},
{nombre:"Radio Moda", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/CRP_MOD_SC.mp3"},
{nombre:"Radiomar", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/CRP_MAR_SC.mp3"},
{nombre:"La Karibeña", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/CRP_KAR_SC.mp3"},
{nombre:"Oasis", url:"https://playerservices.streamtheworld.com/api/livestream-redirect/CRP_OAS_SC.mp3"},
{nombre:"Exitosa", url:"https://cu.onliv3.com/live/exitosa.m3u8"},
{nombre:"Radio Nacional", url:"https://stream.radionacional.gob.pe/nacional.mp3"}
];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const titulo = document.getElementById("titulo");
const cover = document.getElementById("cover");
const playBtn = document.getElementById("playBtn");
const vol = document.getElementById("vol");

audio.setAttribute("playsinline", true);

let hls;

/* PROXY */
function proxy(url){
  return "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
}

function logo(nombre){
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(nombre)}&background=ff0000&color=fff`;
}

function playRadio(url){
  if(hls){ hls.destroy(); }

  const finalUrl = proxy(url);

  if(url.includes(".m3u8")){
    if(Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(finalUrl);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play());
    } else {
      audio.src = finalUrl;
      audio.play();
    }
  } else {
    audio.src = finalUrl;
    audio.play();
  }
}

function render(lista = radios){
  grid.innerHTML = "";

  lista.forEach(r => {
    const div = document.createElement("div");
    div.className = "radio";

    div.innerHTML = `
      <img src="${logo(r.nombre)}">
      <p>${r.nombre}</p>
    `;

    div.onclick = () => {
      playRadio(r.url);
      titulo.textContent = r.nombre;
      cover.src = logo(r.nombre);
    };

    grid.appendChild(div);
  });
}

document.getElementById("buscador").addEventListener("input", e => {
  const t = e.target.value.toLowerCase();
  render(radios.filter(r => r.nombre.toLowerCase().includes(t)));
});

playBtn.onclick = () => {
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
};

audio.onplay = () => playBtn.textContent = "⏸";
audio.onpause = () => playBtn.textContent = "▶";

vol.oninput = () => audio.volume = vol.value;

render();
</script>

</body>
</html>
