<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENAZ FM</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #121212;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* TITULO PRO */
.titulo {
  margin-top: 20px;
  font-size: 2.5rem;
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #00ffcc, #00aaff, #ff00cc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* BUSCADOR */
#buscador {
  margin-top: 15px;
  padding: 10px;
  width: 80%;
  max-width: 400px;
  border-radius: 8px;
  border: none;
}

/* BOTONES */
.botones {
  margin-top: 10px;
}

button {
  margin: 5px;
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #00ffcc;
  cursor: pointer;
  font-weight: bold;
}

/* GRID */
#contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 15px;
  width: 90%;
  max-width: 1000px;
  margin-top: 20px;
}

.item {
  background: #1f1f1f;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  text-align: center;
}

.item img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 8px;
}

/* PLAYER */
#playerBox {
  margin-top: 20px;
  background: #1f1f1f;
  padding: 15px;
  border-radius: 10px;
  width: 90%;
  max-width: 500px;
  text-align: center;
}
</style>
</head>

<body>

<h1 class="titulo">TENAZ FM 🔥</h1>

<input type="text" id="buscador" placeholder="Buscar canal o radio...">

<div class="botones">
  <button onclick="modoRadios()">Radios</button>
  <button onclick="modoTV()">TV (M3U)</button>
</div>

<!-- cargar archivo -->
<input type="file" id="fileInput" accept=".m3u">

<div id="contenedor"></div>

<div id="playerBox">
  <h3 id="tituloActual">Selecciona algo</h3>
  <video id="player" controls width="100%"></video>
</div>

<script>
let lista = [];
const contenedor = document.getElementById("contenedor");
const player = document.getElementById("player");
const titulo = document.getElementById("tituloActual");

/* RADIOS QUE SI FUNCIONAN */
const radios = [
{nombre:"Dance Wave", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
{nombre:"Reggaeton Hits", url:"https://stream.zeno.fm/8u0zv4kz2wzuv"},
{nombre:"Rock FM", url:"https://stream.zeno.fm/0r0xa792kwzuv"}
];

/* MOSTRAR LISTA */
function mostrar(data){
  contenedor.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img src="https://via.placeholder.com/150?text=${item.nombre}">
      <p>${item.nombre}</p>
    `;

    div.onclick = () => {
      player.src = item.url;
      player.play();
      titulo.textContent = item.nombre;
    };

    contenedor.appendChild(div);
  });
}

/* MODOS */
function modoRadios(){
  lista = radios;
  mostrar(lista);
}

function modoTV(){
  mostrar(lista);
}

/* BUSCADOR */
document.getElementById("buscador").addEventListener("input", e => {
  const texto = e.target.value.toLowerCase();
  const filtrado = lista.filter(x => x.nombre.toLowerCase().includes(texto));
  mostrar(filtrado);
});

/* LEER M3U */
document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event){
    const contenido = event.target.result;
    const lineas = contenido.split("\n");

    lista = [];

    for(let i=0; i<lineas.length; i++){
      if(lineas[i].includes("#EXTINF")){
        const nombre = lineas[i].split(",")[1];
        const url = lineas[i+1];

        lista.push({nombre, url});
      }
    }

    mostrar(lista);
  };

  reader.readAsText(file);
});

/* INICIO */
modoRadios();
</script>

</body>
</html>

</body>
</html>
