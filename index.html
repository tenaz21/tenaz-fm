<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENAZ FM</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#8b0000,#1a0000);
  color: white;
}

/* HEADER */
.header {
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

/* BUSCADOR */
.search {
  width: 85%;
  margin: auto;
  display: block;
  padding: 12px;
  border-radius: 25px;
  border: none;
}

/* CATEGORIAS */
.categorias {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 15px;
}

.cat {
  background: #ff9800;
  padding: 8px 15px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  padding: 15px;
}

.radio {
  background: white;
  color: black;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  position: relative;
  cursor: pointer;
}

.radio img {
  width: 100%;
  border-radius: 10px;
}

/* FAVORITO */
.fav {
  position: absolute;
  top: 5px;
  right: 8px;
  font-size: 18px;
}

/* MINI PLAYER */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.player img {
  width: 50px;
  border-radius: 10px;
}

.controls button {
  background: orange;
  border: none;
  border-radius: 50%;
  padding: 10px;
  font-size: 18px;
}

/* VOLUMEN */
.volumen {
  width: 80px;
}
</style>
</head>

<body>

<div class="header">🇵🇪 TENAZ FM</div>

<input class="search" id="buscador" placeholder="Buscar radio...">

<div class="categorias">
  <div class="cat" onclick="filtrar('all')">Todas</div>
  <div class="cat" onclick="filtrar('hiphop')">Hip Hop</div>
  <div class="cat" onclick="filtrar('music')">Música</div>
</div>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player">
  <img id="cover" src="https://via.placeholder.com/50">
  <div id="titulo">Nada sonando</div>

  <div class="controls">
    <button onclick="playPause()">▶</button>
  </div>

  <input type="range" id="vol" class="volumen" min="0" max="1" step="0.01" value="1">

  <audio id="audio"></audio>
</div>

<script>
const radios = [

{nombre:"Dance Wave", tipo:"music", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", tipo:"music", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},

/* HIP HOP */
{nombre:"Hip Hop Hits", tipo:"hiphop", url:"https://stream.zeno.fm/4wqre23fytzuv"},
{nombre:"Urban Beats", tipo:"hiphop", url:"https://stream.zeno.fm/f8xw4k6x5wzuv"},
{nombre:"Rap FM", tipo:"hiphop", url:"https://stream.zeno.fm/7x8f7v6r8wzuv"}

];

let favoritos = JSON.parse(localStorage.getItem("fav")) || [];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const titulo = document.getElementById("titulo");
const cover = document.getElementById("cover");
const vol = document.getElementById("vol");

let listaActual = radios;
let playing = false;

/* MOSTRAR */
function render(lista){
  grid.innerHTML = "";

  lista.forEach(r => {

    const fav = favoritos.includes(r.nombre);

    const div = document.createElement("div");
    div.className = "radio";

    div.innerHTML = `
      <span class="fav">${fav ? "❤️" : "🤍"}</span>
      <img src="https://via.placeholder.com/100">
      <p>${r.nombre}</p>
    `;

    /* PLAY */
    div.onclick = () => {
      audio.src = r.url;
      audio.play();
      titulo.textContent = r.nombre;
      playing = true;
    };

    /* FAVORITO */
    div.querySelector(".fav").onclick = (e) => {
      e.stopPropagation();

      if(fav){
        favoritos = favoritos.filter(f => f !== r.nombre);
      } else {
        favoritos.push(r.nombre);
      }

      localStorage.setItem("fav", JSON.stringify(favoritos));
      render(listaActual);
    };

    grid.appendChild(div);
  });
}

/* FILTRO */
function filtrar(tipo){
  if(tipo === "all"){
    listaActual = radios;
  } else {
    listaActual = radios.filter(r => r.tipo === tipo);
  }
  render(listaActual);
}

/* BUSCADOR */
document.getElementById("buscador").addEventListener("input", e => {
  const t = e.target.value.toLowerCase();
  render(listaActual.filter(r => r.nombre.toLowerCase().includes(t)));
});

/* PLAY */
function playPause(){
  if(!audio.src) return;

  if(playing){
    audio.pause();
  } else {
    audio.play();
  }

  playing = !playing;
}

/* VOLUMEN */
vol.oninput = () => {
  audio.volume = vol.value;
};

/* INIT */
render(radios);
</script>

</body>
</html>
