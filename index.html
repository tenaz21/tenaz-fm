<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Flow Radio</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
}
.header img{
  width:90px;
  border-radius:20px;
  box-shadow:0 0 20px #00f0ff;
}

/* SEARCH */
.search{
  width:90%;
  margin:auto;
  display:block;
  padding:12px;
  border-radius:25px;
  border:none;
  background:#1e293b;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:15px;
  padding-bottom:130px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  text-align:center;
  position:relative;
}
.card img{
  width:100%;
  border-radius:10px;
}
.card:hover{
  box-shadow:0 0 15px #00f0ff;
}

.fav{
  position:absolute;
  top:5px;
  right:8px;
  font-size:18px;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
  border-top:1px solid #1e293b;
}

.cover{
  width:50px;
  border-radius:10px;
}

.btn{
  background:#00f0ff;
  border:none;
  border-radius:50%;
  width:45px;
  height:45px;
  font-size:18px;
}

.vol{
  width:70px;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://via.placeholder.com/90">
  <h2>Urban Flow Radio</h2>
</div>

<input id="search" class="search" placeholder="🔍 Buscar radio...">

<div class="grid" id="grid"></div>

<div class="player">
  <img id="cover" class="cover" src="https://via.placeholder.com/50">
  <div id="title">Nada sonando</div>

  <button id="playBtn" class="btn">▶</button>
  <input type="range" id="vol" class="vol" min="0" max="1" step="0.01" value="1">

  <audio id="audio"></audio>
</div>

<script>

/* 🎧 RADIOS ESTABLES */
const radios = [
{nombre:"Exitosa", url:"https://cu.onliv3.com/live/exitosa.m3u8"},
{nombre:"Radio Nacional", url:"https://stream.radionacional.gob.pe/nacional.mp3"},
{nombre:"Urban Radio", url:"https://stream.0nlineradio.com/urban"},
{nombre:"Dance Wave", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
{nombre:"Romantic Hits", url:"https://stream.zeno.fm/0r0xa792kwzuv"}
];

let favoritos = JSON.parse(localStorage.getItem("fav")) || [];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const cover = document.getElementById("cover");
const playBtn = document.getElementById("playBtn");
const vol = document.getElementById("vol");

let hls;

/* LOGO */
function logo(n){
  return "https://ui-avatars.com/api/?name="+encodeURIComponent(n)+"&background=0ea5e9&color=fff";
}

/* PLAY */
function playRadio(r){

  if(hls){
    hls.destroy();
  }

  if(r.url.includes(".m3u8")){
    if(Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(r.url);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=> audio.play());
    } else {
      audio.src = r.url;
      audio.play();
    }
  } else {
    audio.src = r.url;
    audio.play();
  }

  title.textContent = r.nombre;
  cover.src = logo(r.nombre);
}

/* RENDER */
function render(list){
  grid.innerHTML="";

  list.forEach(r=>{
    const esFav = favoritos.includes(r.nombre);

    const d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      <span class="fav">${esFav?"❤️":"🤍"}</span>
      <img src="${logo(r.nombre)}">
      <p>${r.nombre}</p>
    `;

    d.onclick=()=>playRadio(r);

    d.querySelector(".fav").onclick=(e)=>{
      e.stopPropagation();

      if(esFav){
        favoritos = favoritos.filter(f=>f!==r.nombre);
      } else {
        favoritos.push(r.nombre);
      }

      localStorage.setItem("fav", JSON.stringify(favoritos));
      render(radios);
    };

    grid.appendChild(d);
  });
}

/* BUSCAR */
search.oninput=e=>{
  const t=e.target.value.toLowerCase();
  render(radios.filter(r=>r.nombre.toLowerCase().includes(t)));
};

/* PLAY BTN */
playBtn.onclick=()=>{
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
};

audio.onplay=()=>playBtn.textContent="⏸";
audio.onpause=()=>playBtn.textContent="▶";

/* VOLUMEN */
vol.oninput=()=>audio.volume=vol.value;

/* INIT */
render(radios);

</script>

</body>
</html>
