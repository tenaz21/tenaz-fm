<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENAZ FM</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #121212;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* TITULO */
.titulo {
  margin-top: 20px;
  font-size: 2.5rem;
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #00ffcc, #00aaff, #ff00cc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* BUSCADOR */
#buscador {
  margin-top: 15px;
  padding: 10px;
  width: 80%;
  max-width: 400px;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 1rem;
}

/* GRID */
#contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
  width: 90%;
  max-width: 900px;
  margin-top: 20px;
}

.radio {
  background: #1f1f1f;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.radio:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px #00ffcc;
}

.radio img {
  width: 100%;
  height: 90px;
  border-radius: 8px;
  object-fit: cover;
}

/* 🎧 PLAYER PRO */
#playerBox {
  margin-top: 25px;
  background: linear-gradient(145deg, #1f1f1f, #181818);
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,255,204,0.3);
}

#cover {
  width: 100%;
  height: 180px;
  border-radius: 12px;
  object-fit: cover;
}

#tituloRadio {
  margin-top: 10px;
  font-size: 1.2rem;
  font-weight: bold;
}

/* BOTON PLAY */
.play-btn {
  margin-top: 15px;
  background: #00ffcc;
  border: none;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 0 15px #00ffcc;
  transition: 0.2s;
}

.play-btn:hover {
  transform: scale(1.1);
}

audio {
  display: none;
}
</style>
</head>

<body>

<h1 class="titulo">TENAZ FM 🔥</h1>

<input type="text" id="buscador" placeholder="Buscar radio...">

<div id="contenedor"></div>

<!-- 🎧 PLAYER -->
<div id="playerBox">
  <img id="cover" src="https://via.placeholder.com/300x200?text=TENAZ+FM">
  <div id="tituloRadio">Selecciona una radio</div>
  <button class="play-btn" onclick="togglePlay()">▶</button>
  <audio id="player"></audio>
</div>

<script>
const radios = [

  {
    nombre:"Capital",
    img:"https://upload.wikimedia.org/wikipedia/commons/6/6c/Radio_Capital_Peru.png",
    url:"https://stream.zeno.fm/8u0zv4kz2wzuv"
  },

  {
    nombre:"Oxígeno",
    img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Radio_Oxigeno_logo.png",
    url:"https://stream.zeno.fm/0r0xa792kwzuv"
  },

  {
    nombre:"Corazón",
    img:"https://upload.wikimedia.org/wikipedia/commons/4/4e/Radio_Corazon_logo.png",
    url:"https://stream.zeno.fm/f3y6q8zq5wzuv"
  },

  {
    nombre:"Radio Internacional",
    img:"https://via.placeholder.com/150?text=Music",
    url:"https://streams.ilovemusic.de/iloveradio1.mp3"
  },

  {
    nombre:"Dance Wave",
    img:"https://via.placeholder.com/150?text=Dance",
    url:"https://dancewave.online/dance.mp3"
  }

];

const contenedor = document.getElementById("contenedor");
const player = document.getElementById("player");
const titulo = document.getElementById("tituloRadio");
const cover = document.getElementById("cover");
const btn = document.querySelector(".play-btn");

let playing = false;

/* CREAR TARJETAS */
function cargarRadios(lista){
  contenedor.innerHTML = "";

  lista.forEach(radio => {

    const div = document.createElement("div");
    div.className = "radio";

    div.innerHTML = `
      <img src="${radio.img}" onerror="this.src='https://via.placeholder.com/150?text=Radio'">
      <p>${radio.nombre}</p>
    `;

    div.onclick = () => {
      player.src = radio.url;
      titulo.textContent = radio.nombre;
      cover.src = radio.img;
      player.play();
      btn.innerHTML = "⏸";
      playing = true;
    };

    contenedor.appendChild(div);
  });
}

/* BUSCADOR */
document.getElementById("buscador").addEventListener("input", e => {
  const texto = e.target.value.toLowerCase();

  const filtrado = radios.filter(r =>
    r.nombre.toLowerCase().includes(texto)
  );

  cargarRadios(filtrado);
});

/* PLAY / PAUSE */
function togglePlay(){
  if(!player.src) return;

  if(playing){
    player.pause();
    btn.innerHTML = "▶";
  } else {
    player.play();
    btn.innerHTML = "⏸";
  }

  playing = !playing;
}

/* INICIO */
cargarRadios(radios);
</script>

</body>
</html>
